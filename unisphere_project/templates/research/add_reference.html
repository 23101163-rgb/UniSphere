{% extends "base.html" %}
{% block title %}Add Reference Paper{% endblock %}
{% block content %}
<div class="col-md-6">
    <div class="card p-4">
        <h3>Add Reference Paper</h3>
        <p>Group: <strong>{{ group.name }}</strong> | Topic: {{ group.research_topic }}</p>
        <form method="post">
            {% csrf_token %}
            {% for f in form %}
            <div class="mb-3">
                <label class="form-label">{{ f.label }}</label>
                {{ f }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Add Paper</button>
            <a href="{% url 'research:group_detail' group.pk %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
