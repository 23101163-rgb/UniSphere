{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="col-md-8"><div class="card p-4"><h3>Edit Profile</h3>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
        <button type="submit" class="btn btn-primary">Save</button> <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div></div>
{% endblock %}
