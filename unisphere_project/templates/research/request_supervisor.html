{% extends "base.html" %}
{% block title %}Request Supervisor{% endblock %}
{% block content %}
<div class="col-md-6">
    <div class="card p-4">
        <h3>Request Supervisor for "{{ group.name }}"</h3>
        <form method="post">
            {% csrf_token %}
            {% for f in form %}
            <div class="mb-3">
                <label class="form-label">{{ f.label }}</label>
                {{ f }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Send Request</button>
            <a href="{% url 'research:group_detail' group.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
