{% extends "base.html" %}
{% block title %}Select Topic{% endblock %}
{% block content %}
<div class="col-md-6">
    <div class="card p-4">
        <h3>Select Research Topic</h3>
        <p>Group: <strong>{{ group.name }}</strong></p>
        <p>Research Area: {{ group.research_area }}</p>
        <form method="post">
            {% csrf_token %}
            {% for f in form %}
            <div class="mb-3">
                <label class="form-label">{{ f.label }}</label>
                {{ f }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-info">Confirm Topic</button>
        </form>
    </div>
</div>
{% endblock %}
