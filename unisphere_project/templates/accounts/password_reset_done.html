{% extends "base.html" %}
{% block title %}Check Your Email{% endblock %}

{% block content_public %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm text-center">

            <h3 class="mb-3">
                <i class="bi bi-envelope-check text-success"></i> Check Your Email
            </h3>

            <p class="mb-3">
                If an account exists for that email, a password reset link has been sent.
            </p>

            <p class="text-muted small">
                Please check your inbox (and spam folder if needed).
            </p>

            <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary mt-3">
                Back to Sign In
            </a>

        </div>
    </div>
</div>
{% endblock %}
