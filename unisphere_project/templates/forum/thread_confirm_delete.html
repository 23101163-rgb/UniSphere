{% extends "base.html" %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="col-md-6 mx-auto">
    <div class="card p-4">
        <h4 class="text-danger"><i class="bi bi-trash"></i> Delete Post</h4>
        <p>Are you sure you want to delete this post?</p>
        <div class="card p-3 mb-3" style="background:var(--bg-raised, #f8f9fa);">
            <h6 class="fw-bold">{{ thread.title }}</h6>
            <p class="mb-0 small">{{ thread.content|truncatewords:30 }}</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Yes, Delete</button>
                <a href="{% url 'forum:thread_detail' thread.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
