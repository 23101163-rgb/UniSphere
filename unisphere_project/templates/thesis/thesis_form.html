{% extends "base.html" %}
{% block title %}Add Thesis{% endblock %}
{% block content %}
<div class="col-md-8"><div class="card p-4"><h3>Add Thesis Resource</h3>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}{% for f in form %}<div class="mb-3"><label class="form-label">{{ f.label }}</label>{{ f }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary">Save</button></form></div></div>
{% endblock %}
