{% extends "base.html" %}
{% block title %}Password Updated{% endblock %}

{% block content_public %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm text-center">

            <h3 class="mb-3">
                <i class="bi bi-check-circle-fill text-success"></i> Password Updated
            </h3>

            <p>Your password has been changed successfully.</p>

            <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                Back to Sign In
            </a>

        </div>
    </div>
</div>
{% endblock %}
